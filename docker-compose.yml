services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-theater}
      POSTGRES_USER: ${POSTGRES_USER:-theater}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-theater} -d ${POSTGRES_DB:-theater}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.worker
    command: ['node', '--import', 'tsx', 'scripts/run-migrations.ts']
    env_file: .env
    environment:
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    restart: 'no'
    networks:
      - internal

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
        - NEXT_PUBLIC_BASE_URL=${NEXT_PUBLIC_BASE_URL}
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
    ports:
      - '3000:3000'
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - internal
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:8080/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - internal
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile.worker
    command: ['node', '--import', 'tsx', 'scripts/start-scheduler.ts']
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - internal
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

volumes:
  pgdata:

networks:
  internal:
    driver: bridge
