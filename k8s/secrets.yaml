# ⚠️  Never commit real secrets. Fill in actual values before applying.
# In production use a secrets manager (Sealed Secrets, External Secrets Operator, Vault).
apiVersion: v1
kind: Secret
metadata:
  name: theater-secrets
  namespace: theater
type: Opaque
stringData:
  # Points to the k8s Service name "db" — resolves inside the cluster
  DATABASE_URL: 'postgresql://username:password@db:5432/database'
  # Used by the worker for LISTEN/NOTIFY (requires a direct, non-pooled connection)
  DIRECT_DATABASE_URL: 'postgresql://username:password@db:5432/database'
  POSTGRES_PASSWORD: 'password'

  NEXTAUTH_SECRET: 'change-me'

  MOLLIE_API_KEY: 'test_change_me'

  SMTP_HOST: 'smtp.gmail.com'
  SMTP_PORT: '587'
  SMTP_USER: 'change-me@gmail.com'
  SMTP_PASS: 'change-me'

  R2_ACCOUNT_ID: 'change-me'
  R2_ACCESS_KEY_ID: 'change-me'
  R2_SECRET_ACCESS_KEY: 'change-me'

  APP_ID: 'change-me'
