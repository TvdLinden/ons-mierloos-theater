# Worker processes jobs from the database queue (PDF generation, payments, emails, etc.).
# replicas: 1 — must stay at 1. Multiple workers would race to claim the same jobs.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: theater
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: ons-mierloos-theater/worker:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080  # Health check endpoint
          envFrom:
            - configMapRef:
                name: theater-config
            - secretRef:
                name: theater-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
