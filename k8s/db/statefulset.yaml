# StatefulSet is used for databases instead of Deployment because:
#   - Pods get a stable, predictable name (db-0, db-1, ...)
#   - Pods get a stable DNS entry (db-0.db.theater.svc.cluster.local)
#   - Ordered startup/shutdown (important for clustered databases)
# For our single postgres instance the main benefit is the stable identity.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: db
  namespace: theater
spec:
  serviceName: db   # Must match the name of the headless Service in db/service.yaml
  replicas: 1
  selector:
    matchLabels:
      app: db
  template:
    metadata:
      labels:
        app: db
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: theater-config
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: theater-config
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: theater-secrets
                  key: POSTGRES_PASSWORD
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "username", "-d", "database"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "username", "-d", "database"]
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-pvc
